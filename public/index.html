<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scramjet Proxy</title>

<style>
html,body{
margin:0;
height:100%;
background:black;
color:#3fa3ff;
font-family:Arial;
overflow:hidden;
}

#topbar{
height:50px;
display:flex;
align-items:center;
padding:10px;
background:#050505;
box-shadow:0 0 20px #3fa3ff;
}

#url{
flex:1;
padding:10px;
background:#111;
border:none;
color:#3fa3ff;
outline:none;
}

button{
margin-left:10px;
padding:10px 15px;
background:#3fa3ff;
border:none;
cursor:pointer;
}

iframe{
position:absolute;
top:50px;
left:0;
width:100vw;
height:calc(100vh - 50px);
border:none;
}
</style>
</head>

<body>

<div id="topbar">
<input id="url" placeholder="Enter URL">
<button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go(){

let url=document.getElementById("url").value

if(!url.startsWith("http")){
url="https://"+url
}

let encoded=btoa(url)

document.getElementById("frame").src="/bare/"+encoded

}
</script>

</body>
</html>

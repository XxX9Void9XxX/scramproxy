<!DOCTYPE html>
<html>
<head>
<title>Scramjet Proxy</title>
<style>
body{
background:black;
color:#3fa3ff;
font-family:Arial;
text-align:center;
margin-top:100px;
}
input{
padding:10px;
width:400px;
}
button{
padding:10px;
}
</style>
</head>

<body>

<h1>Scramjet Proxy</h1>

<input id="url" placeholder="Enter URL">
<button onclick="go()">Go</button>

<script>
function go(){
 let url=document.getElementById("url").value

 if(!url.startsWith("http")){
  url="https://"+url
 }

 location.href="/scramjet/"+btoa(url)
}
</script>

</body>
</html>

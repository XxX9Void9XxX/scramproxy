<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scram Proxy</title>

<style>
html,body{
margin:0;
height:100%;
background:#000;
color:#3fa3ff;
font-family:Arial;
overflow:hidden;
}

#topbar{
height:50px;
background:#050505;
display:flex;
align-items:center;
padding:0 10px;
box-shadow:0 0 20px #3fa3ff;
}

#url{
flex:1;
padding:8px;
background:#111;
border:none;
color:#3fa3ff;
outline:none;
}

button{
margin-left:10px;
padding:8px 15px;
background:#3fa3ff;
border:none;
cursor:pointer;
}

iframe{
position:fixed;
top:50px;
left:0;
width:100vw;
height:calc(100vh - 50px);
border:none;
background:black;
}
</style>
</head>

<body>

<div id="topbar">
<input id="url" placeholder="Enter URL">
<button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script src="proxy.js"></script>

</body>
</html>

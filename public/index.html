<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scramjet Proxy</title>

<style>
body{
background:black;
color:#3fa3ff;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

h1{
font-size:50px;
text-shadow:0 0 20px #3fa3ff;
}

input{
width:400px;
padding:12px;
border:none;
outline:none;
background:#111;
color:#3fa3ff;
}

button{
padding:12px 20px;
margin-left:10px;
background:#3fa3ff;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Scramjet Proxy</h1>

<div>
<input id="url" placeholder="Enter URL">
<button onclick="go()">Go</button>
</div>

<script>
function go(){
let url=document.getElementById("url").value

if(!url.startsWith("http")){
url="https://"+url
}

location.href="/service/"+btoa(url)
}
</script>

</body>
</html>
